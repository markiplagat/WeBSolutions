{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Clinician Dashboard</title>
  <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body class="auth-page">
  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Clinician Dashboard</h2>
      <p>Welcome {{ request.user.get_full_name|default:request.user.username }}. You are logged in as a clinician.</p>
      <a class="btn btn--primary" href="/">Go to Home</a>
      <form method="post" action="/accounts/logout/" style="display:inline; margin-left:.5rem;">
        {% csrf_token %}
        <button class="btn btn--ghost" type="submit">Log out</button>
      </form>
    </div>
  </div>
</body>
</html>
