{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign Up | Pressure Monitor</title>
  <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body class="auth-page">

  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="auth-logo" aria-hidden="true">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
          <path d="M3 12h4l2-6 4 12 2-6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>Pressure Monitor</h1>
      <p>Real-time pressure monitoring and ulcer prevention</p>
    </div>

    <div class="auth-tabs">
      <a class="auth-tab" href="{% url 'login' %}">Login</a>
      <a class="auth-tab auth-tab--active" href="{% url 'signup' %}">Sign Up</a>
    </div>

    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="auth-muted">Sign up to start monitoring pressure data</p>

      {% if form.errors %}
        <div class="auth-error">
          Please fix the errors below.
        </div>
      {% endif %}

      <form method="post" class="auth-form">
        {% csrf_token %}

        <label>Full Name</label>
        <input type="text" name="full_name" placeholder="John Smith" value="{{ request.POST.full_name }}" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="email@example.com" value="{{ request.POST.email }}" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <label>Account Type</label>
        <select name="account_type" required>
          <option value="PATIENT">Patient</option>
          <option value="CLINICIAN">Clinician</option>
        </select>

        <button class="auth-btn" type="submit">Create Account</button>
      </form>

      <div class="auth-foot">
        <a href="/">← Back to home</a>
      </div>
    </div>
  </div>

</body>
</html>
