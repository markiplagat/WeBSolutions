{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Pressure Monitor{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="/">Pressure Monitor</a>
      <nav class="nav">
        <a href="#features">Features</a>
        <a href="#how">How it works</a>
        <a href="#why">Why choose us</a>
      </nav>
      <div class="topbar__actions">
  {% if user.is_authenticated %}
    <span style="color: white; margin-right: 10px;">
      Hi, {{ user.username }}
    </span>
    <a class="btn btn--ghost" href="/accounts/logout">Logout</a>
  {% else %}
    <a class="btn btn--ghost" href="/accounts/login">Log in</a>
    <a class="btn btn--primary" href="/accounts/signup">Get Started</a>
  {% endif %}
</div>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <span>© {% now "Y" %} Pressure Monitor</span>
    </div>
  </footer>
</body>
</html>
